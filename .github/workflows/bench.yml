name: bench

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # nightly, full size
  workflow_dispatch:

# github-action-benchmark needs contents:write to push the time series to gh-pages
# (only on non-PR events; see the chart job below).
permissions:
  contents: write

jobs:
  # One leg per workload, each with its OWN Postgres service, run in parallel — so
  # recursive's leftover rows never bias deep's claim latency (and vice versa), and the
  # suite finishes in roughly one workload's time.
  bench:
    name: bench (${{ matrix.workload }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workload: [recursive, deep, drain, drain-big]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: genroc
          POSTGRES_PASSWORD: genroc
          POSTGRES_DB: genroc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genroc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CGO_ENABLED: "1"
      POSTGRES_DSN: postgres://genroc:genroc@localhost:5432/genroc_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Ensure ~/.bun/bin/bun (Makefile invokes that path)
        run: |
          src="$(command -v bun)"; dst="$HOME/.bun/bin/bun"
          if [ "$src" != "$dst" ]; then mkdir -p "$HOME/.bun/bin" && ln -sf "$src" "$dst"; fi
      - name: Install test dependencies
        run: cd tests && bun install --frozen-lockfile

      - name: Run bench
        run: BENCH_JSON="$RUNNER_TEMP/${{ matrix.workload }}.json" make bench-${{ matrix.workload }}

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.workload }}
          path: ${{ runner.temp }}/${{ matrix.workload }}.json

      # Surface this leg's numbers in its job summary (the only report on PRs, where
      # the chart job below is skipped). The host line records the hardware so a
      # throughput shift can be traced to a runner change rather than a code change.
      - name: Results to job summary
        run: |
          json="$RUNNER_TEMP/${{ matrix.workload }}.json"
          {
            echo "### Benchmark: ${{ matrix.workload }}"
            echo ""
            echo "**host:** $(jq -r '.[0].extra // "n/a"' "$json")"
            echo "**runner image:** ${ImageOS:-?} ${ImageVersion:-?}"
            echo ""
            echo "| metric | inst/s |"
            echo "| --- | --- |"
            jq -r '.[] | "| \(.name) | \(.value) |"' "$json"
          } >> "$GITHUB_STEP_SUMMARY"

  # Merge the per-workload results and push the per-commit time series (charts under the
  # gh-pages branch) so a regression can be traced to a commit. Non-PR only: the action
  # always fetches gh-pages, which doesn't exist on PR branches — and PRs already show
  # their numbers in the per-leg summaries above. Report-only: never fails the build.
  chart:
    name: chart history
    needs: bench
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          merge-multiple: true
          path: results

      - name: Merge results
        run: jq -s 'add' results/*.json > "$RUNNER_TEMP/bench.json"

      - name: Archive merged results for this run
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: ${{ runner.temp }}/bench.json

      # github-action-benchmark fetches gh-pages and fails if it doesn't exist yet.
      # Create it as an empty orphan branch on the first run, via plumbing so the
      # working tree / current checkout is untouched.
      - name: Ensure gh-pages branch exists
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git config user.email "github-action-benchmark@users.noreply.github.com"
            git config user.name "github-action-benchmark"
            tree="$(git mktree </dev/null)"
            commit="$(git commit-tree "$tree" -m 'init gh-pages for benchmark history')"
            git push origin "$commit:refs/heads/gh-pages"
          fi

      - name: Track history
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: genroc throughput
          tool: customBiggerIsBetter
          output-file-path: ${{ runner.temp }}/bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          auto-push: true
          summary-always: true
          fail-on-alert: false
