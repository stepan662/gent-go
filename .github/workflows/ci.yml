name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: tests (Go unit + dual-engine DB + TS integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gent
          POSTGRES_PASSWORD: gent
          POSTGRES_DB: gent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CGO_ENABLED: "1"
      POSTGRES_DSN: postgres://gent:gent@localhost:5432/gent_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Ensure ~/.bun/bin/bun (Makefile invokes that path)
        run: |
          src="$(command -v bun)"; dst="$HOME/.bun/bin/bun"
          if [ "$src" != "$dst" ]; then mkdir -p "$HOME/.bun/bin" && ln -sf "$src" "$dst"; fi
      - name: Install test dependencies
        run: cd tests && bun install --frozen-lockfile
      - name: make test
        run: make test

  stress:
    name: stress (concurrency / deadlock, x3)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gent
          POSTGRES_PASSWORD: gent
          POSTGRES_DB: gent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CGO_ENABLED: "1"
      POSTGRES_DSN: postgres://gent:gent@localhost:5432/gent_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make test-stress
        run: make test-stress
