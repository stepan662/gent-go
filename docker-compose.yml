services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: genroc
      POSTGRES_PASSWORD: genroc
      POSTGRES_DB: genroc_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genroc -d genroc_test"]
      interval: 5s
      timeout: 5s
      retries: 5
