version: "2"
sql:
  - name: sqlite
    engine: "sqlite"
    schema: "internal/db/migrations"
    queries: "internal/db/queries.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/gen"

  # PostgreSQL output is generated solely to validate cross-engine SQL compatibility
  # (go build ./... compiles it). The directory is gitignored and never imported at runtime.
  - name: postgresql
    engine: "postgresql"
    schema: "internal/db/migrations"
    queries: "internal/db/queries.sql"
    gen:
      go:
        package: "dbgenpg"
        out: "internal/db/gen_pg_validate"
