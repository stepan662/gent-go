# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: child
input_schema:
  type: object
  properties:
    sleep:
      type: integer
  required: [sleep]
tasks:
  - id: fourth
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/fourth"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: end
output:
  final_result: "{{outputs.fourth}}"
