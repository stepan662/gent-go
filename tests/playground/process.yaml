# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
    rec:
      $ref: "#/$defs/recursive"
  required: [ttl]
  $defs:
    recursive:
      type: object
      properties:
        num:
          type: number
        rec:
          $ref: "#/$defs/recursive"

steps:
  - id: start
    switch: next

  - id: loop
    output:
      result: "{{ self.previous.result ?? input }}"
    switch:
      - case: "self.output.result != null"
        goto: $start
      - goto: end

output: "{{ outputs.loop }}"
