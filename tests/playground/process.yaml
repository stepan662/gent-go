# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
  required: [ ttl ]
steps:
  - id: start
    switch: next

  - id: loop
    output:
      num: "{{ (self.previous.num ?? 0) + 1 }}"
    switch:
      - goto: end

output:
  num: "{{ outputs.loop.num }}"
