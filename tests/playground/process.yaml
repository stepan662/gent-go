# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
config_schema:
  type: object
  properties:
    server_url:
      type: string
      secret: true
  required: [server_url]

input_schema:
  type: number

tasks:
  - id: first
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "{{ config.server_url }}/first"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: second
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "{{ config.server_url }}/second"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: third
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "{{ config.server_url }}/third"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: long_long_long_long
    action:
      type: child
      input:
        sleep: "{{ input }}"
      name: "child"
      result_schema:
        type: object
        properties:
          final_result:
            type: object  
            properties:
              slept:
                type: number
                secret: true
    output: "{{ self.result }}"
    switch: end

output: "{{outputs.long_long_long_long}}"