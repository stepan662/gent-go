# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
  required: [ ttl ]
steps:
  - id: switch
    switch:
      - case: "input.ttl > 0"
        goto: $recursion
      - goto: end

  - id: recursion
    call:
      type: child
      name: order-pipeline
      input:
        ttl: "{{ input.ttl - 1 }}"
      output_schema:
        type: object
        properties:
          num:
            type: integer
        required: [num]
  # - id: recursion
  #   call:
  #     type: child_parallel
  #     children:
  #       first:
  #         name: order-pipeline
  #         input:
  #           ttl: "{{ input.ttl - 1 }}"
  #         output_schema:
  #           type: object
  #           properties:
  #             num:
  #               type: integer
  #       second:
  #         name: order-pipeline
  #         input:
  #           ttl: "{{ input.ttl - 1 }}"
  #         output_schema:
  #           type: object
  #           properties:
  #             num:
  #               type: integer
    switch:
      - goto: end

output:
  num: "{{ (outputs.recursion.num ?? 0) + 1 }}"
