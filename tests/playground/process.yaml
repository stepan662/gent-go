# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
  required:
    - ttl
steps:
  - id: recursion_condition
    switch:
      - when: "{{input.ttl > 0}}"
        goto: "#recursion"
      - when: default
        goto: "#finish"
  - id: recursion
    call:
      type: child_process
      processes:
        - name: order-pipeline
          input:
            ttl: "{{input.ttl - 1}}"
        - name: order-pipeline
          input:
            ttl: "{{input.ttl - 1}}"
      child_output_schema:
        type: object
        properties:
          processes:
            type: number
        required:
          - processes
  - id: finish
    call:
      type: child_process
      processes:
        - name: child
output:
  processes: "{{(outputs.recursion[0].output.processes ?? 0) + (outputs.recursion[1].output.processes ?? 0) + 1}}"
