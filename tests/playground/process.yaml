# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
steps:
  - id: start
    call:
      type: rest
      endpoint: http://localhost:3001/start
      output_schema:
        type: object
        properties:
          ok:
            type: boolean
        required: [ok]
    on_error:
      - code: ["http.%"]
        goto: "#finale"

  - id: finale
    params:
      previous_result: "{{outputs.start.ok}}"
    call:
      type: rest
      endpoint: http://localhost:3001/finale
    
