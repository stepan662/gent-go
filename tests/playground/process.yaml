# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: number

config_schema:
  type: object
  properties:
    server_url:
      type: boolean
  required: [server_url]

tasks:
  - id: first
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "{{ config.server_url }}/first"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: second
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "{{ config.server_url }}/second"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: third
    action:
      type: rest
      input:
        sleep: "{{ input }}"
      endpoint: "http://localhost:3001/third"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: next

  - id: long_long_long_long
    action:
      type: child
      input:
        sleep: "{{ input }}"
      name: "child"
      result_schema:
        type: object
        properties:
          final_result:
            type: object  
            properties:
              slept:
                type: number
    output: "{{ self.result }}"
    switch: end

output: "{{outputs.long_long_long_long}}"


---

name: child
input_schema:
  type: object
  properties:
    sleep:
      type: number
  required: [sleep]
tasks:
  - id: fourth
    action:
      type: rest
      input:
        sleep: "{{ input.sleep }}"
      endpoint: "http://localhost:3001/fourth"
      result_schema:
        type: object
        properties:
          slept:
            type: number
        required: [slept]
    output: "{{ self.result }}"
    switch: end
output:
  final_result: "{{outputs.fourth}}"

