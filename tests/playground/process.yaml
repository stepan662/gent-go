# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
  required: [ ttl ]
steps:
  - id: switch
    switch:
      - case: "input.ttl > 0"
        next: $recursion
      - next: end

  - id: recursion
    call:
      type: child_process
      processes:
        - name: order-pipeline
          input:
            ttl: "{{ input.ttl - 1 }}"
        - name: order-pipeline
          input:
            ttl: "{{ input.ttl - 1 }}"
      child_output_schema:
        type: object
        properties:
          num:
            type: integer

output:
  num: "{{ (outputs.recursion[0].output.num ?? 0) + (outputs.recursion[1].output.num ?? 0) + 1 }}"
