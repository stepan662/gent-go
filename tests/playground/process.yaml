# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
steps:
  - id: start
    call:
      type: child_process
      processes:
        - name: child
    on_error:
      - code: ["child.failed"]
        goto: "#failure"      

  - id: success
    call:
      type: rest
      endpoint: http://localhost:3001/success
      output_schema:
        type: object
        properties:
          ok:
            type: boolean
        required: [ok]
    switch:
      - when: default
        goto: $end

  - id: failure
    call:
      type: rest
      endpoint: http://localhost:3001/failure
    params:
      error: "{{error.code}}: {{error.message}} ({{error.step}})"
  

    
