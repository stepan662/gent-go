# yaml-language-server: $schema=http://localhost:8888/process-schema.json
name: order-pipeline
input_schema:
  type: object
  properties:
    ttl:
      type: integer
  required: [ttl]

tasks:
  - id: start
    action:
      type: rest
      endpoint: "http://localhost:3001/start"
      result_schema:
        type: object
        properties:
          num:
            type: number
          str:
            type: string
        required: [num, str]
    output: "{{ self.result }}"
    switch:
      - case: "self.result.num < input.ttl"
        goto: next
      - goto: end

  - id: finish
    output: "{{outputs.start.num}}"
    switch: end
